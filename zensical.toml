# Zensical Documentation Configuration
# See https://zensical.dev for full documentation

[project]
# Required: Name of the site
site_name = "Marka AI Documentation"

# Optional: Canonical URL for the site
site_url = "https://marka-ai.dev/docs"

# Optional: Site description (used in HTML head)
site_description = "AI-powered marketing automation for Egyptian & MENA businesses — Arabic-first, built for SMEs"

# Optional: Site author
site_author = "Marka AI Team"

# Optional: Copyright notice
copyright = "&copy; 2025 Marka AI"

# Directory containing documentation source files
docs_dir = "docs"

# Directory where built site will be written
site_dir = "site"

# Development server address (for `zensical serve`)
dev_addr = "localhost:8000"

# Theme variant: "modern" (default) or "classic"
[project.theme]
variant = "modern"

# mkdocstrings plugin configuration
[project.plugins.mkdocstrings.handlers.python]
# Paths to Python source directories
paths = ["ai"]
# External documentation inventories for cross-references
inventories = ["https://docs.python.org/3/objects.inv"]

# mkdocstrings Python handler options
[project.plugins.mkdocstrings.handlers.python.options]
# Docstring style: "google", "numpy", or "sphinx"
docstring_style = "google"
# Show inherited members
inherited_members = true
# Show source code links
show_source = true
# Show root heading
show_root_heading = true

# Marka AI — CI/CD Pipeline
#
# This file grows with the project.
# Uncomment each section as the corresponding layer gets built.
# Current active: structure check only.

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────
# PHASE 1 — Always runs. Just verifies the repo
# structure is intact.
# ─────────────────────────────────────────────
jobs:
  structure:
    name: Repo structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required=(
            "AGENTS.md"
            "README.md"
            "plan.md"
            "feature_log.md"
            ".env.example"
          )
          missing=()
          for f in "${required[@]}"; do
            [ ! -f "$f" ] && missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required files:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All required files present."


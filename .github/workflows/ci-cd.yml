name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Container Registry
  REGISTRY: ghcr.io
  # Image names
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  AI_IMAGE: ghcr.io/${{ github.repository }}/ai

jobs:
  # ==========================================
  # Job 1: Backend CI (Express.js)
  # ==========================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend linter
        working-directory: ./backend
        run: npm run lint

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Build backend
        working-directory: ./backend
        run: npm run build

  # ==========================================
  # Job 2: Frontend CI (React/Next.js)
  # ==========================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend linter
        working-directory: ./frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # ==========================================
  # Job 3: AI Backend CI (FastAPI/Python)
  # ==========================================
  ai-ci:
    name: AI Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install AI dependencies
        working-directory: ./ai
        run: |
          pip install --upgrade pip
          uv sync

      - name: Run AI linter (ruff)
        working-directory: ./ai
        run: uv run ruff check .

      - name: Run AI tests
        working-directory: ./ai
        run: uv run pytest tests/ -v

      - name: Build AI backend
        working-directory: ./ai
        run: uv run fastapi dev

  # ==========================================
  # Job 4: Build Docker Images
  # ==========================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, ai-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # Build Backend Image
      # ==========================================
      - name: Build Backend Image
        working-directory: ./backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:latest .
          docker tag ${{ env.BACKEND_IMAGE }}:latest ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # ==========================================
      # Build Frontend Image
      # ==========================================
      - name: Build Frontend Image
        working-directory: ./frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:latest .
          docker tag ${{ env.FRONTEND_IMAGE }}:latest ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # ==========================================
      # Build AI Image
      # ==========================================
      - name: Build AI Image
        working-directory: ./ai
        run: |
          docker build -t ${{ env.AI_IMAGE }}:latest .
          docker tag ${{ env.AI_IMAGE }}:latest ${{ env.AI_IMAGE }}:${{ github.sha }}

      # ==========================================
      # Push Images to Registry
      # ==========================================
      - name: Push Backend Image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Push AI Image
        run: |
          docker push ${{ env.AI_IMAGE }}:latest
          docker push ${{ env.AI_IMAGE }}:${{ github.sha }}

  # ==========================================
  # Job 5: Deploy to VPS (if push to main)
  # ==========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.GITHUB_ACTIONS_DEPLOY_KEY }}
          script: |
            echo "Starting deployment..."
            cd /opt/marka-ai
            git pull origin main
            docker compose pull
            docker compose up -d --build
            echo "Deployment complete!"

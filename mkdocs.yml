site_name: Marka AI Documentation
site_description: AI-powered marketing automation platform - Arabic-first, built for MENA SMEs
site_author: Marka AI Team
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search:
      separator: '[\s\-\.]+'
  - mkdocstrings:
      handlers:
        python:
          paths: [ai]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_category_heading: true
            members_order: source

nav:
  - Home: index.md
  - Quick Start: getting-started/quick-start.md
  - Architecture: architecture/overview.md
  - Reference:
    - App:
      - Agents: reference/api/agents/index.md
      - Api:
        - V1: reference/api/api/v1/index.md
      - Core: reference/api/core/index.md
      - Llm: reference/api/llm/index.md
      - Rag: reference/api/rag/index.md
      - Schemas: reference/api/schemas/index.md
      - Services:
        - Test Service: reference/api/services/test_service.md
      - Main: reference/api/main/index.md
    - Reference/Environment: reference/environment-vars.md
    - Agents: agents.md

      - API Reference:
        - Overview: reference/api/index.md
        - Agents: reference/api/agents/index.md
        - API:
          - Overview: reference/api/api/index.md
          - V1:
            - Overview: reference/api/api/v1/index.md
            - Middleware:
              - Overview: reference/api/api/v1/middleware/index.md
              - Auth: reference/api/api/v1/middleware/auth.md
        - App: reference/api/app/index.md
        - Core: reference/api/core/index.md
        - LLM:
          - Overview: reference/api/llm/index.md
          - Test LLM: reference/api/llm/test_llm.md
        - Main: reference/api/main.md
        - RAG: reference/api/rag/index.md
        - Schemas: reference/api/schemas/index.md
        - Services:
          - Overview: reference/api/services/index.md
          - Test Service: reference/api/services/test_service.md
        - Test: reference/api/test.md

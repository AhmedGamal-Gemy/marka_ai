version: '3.8'

services:
  # ==========================================
  # API Gateway (Express.js Backend)
  # ==========================================
  backend:
    build:
      context: ./backend
      target: production
    container_name: marka-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: marka_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marka_password}
      POSTGRES_DB: marka_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - marka-network

  # ==========================================
  # Frontend (React/Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      target: production
    container_name: marka-frontend
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - marka-network

  # ==========================================
  # AI Backend (FastAPI)
  # ==========================================
  ai:
    build:
      context: ./ai
      target: production
    container_name: marka-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: marka_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marka_password}
      POSTGRES_DB: marka_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - marka-network

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: marka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marka_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marka_password}
      POSTGRES_DB: marka_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marka_user -d marka_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marka-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: marka-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marka-network

# ==========================================
# Networks
# ==========================================
networks:
  marka-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres-data:
  redis-data:

# ==========================================
# MARKA AI - UNIFIED DOCKER COMPOSE CONFIG
# ==========================================

services:
  # --- MongoDB: Primary Database ---
  mongodb:
    image: mongo:8.0
    container_name: marka_mongodb
    command: ["--quiet"]
    ports:
      # Mapped to 27027 on the host to avoid conflict with local MongoDB installations
      - "27027:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      # Socket-based check: Avoids the connection logs triggered by mongosh
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/27017' || exit 1"]
      interval: 120s 
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # --- Qdrant: Vector Store for RAG ---
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: marka_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Checks if the TCP port 6333 is open using Bash built-ins
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # --- FastAPI: AI Layer Backend ---
  fastapi:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: marka_api
    ports:
      # Mapped to 8080 on the host to avoid port 8000 conflicts
      - "8080:8000"
    env_file:
      - .env
    environment:
      # Inject internal connection strings for Docker network
      - MONGODB_URI=mongodb://mongodb:27017
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      # Socket-based check for port 8000
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./ai:/app
    restart: always

  # --- Telegram Bot: Primary Frontend ---
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: marka_bot
    env_file:
      - .env
    environment:
      # Use the internal Docker URL for the AI API (internal port remains 8000)
      - API_URL=http://fastapi:8000
    depends_on:
      fastapi:
        condition: service_healthy
    volumes:
      - ./bot:/app
    restart: on-failure

  # --- Web UI: Secondary Frontend ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: marka_web
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      # Frontend must call the public API URL (localhost:8080 from browser)
      - VITE_API_URL=http://localhost:8080
    depends_on:
      fastapi:
        condition: service_healthy
    volumes:
      - ./web:/app
    restart: always

volumes:
  mongodb_data:
  qdrant_data:
